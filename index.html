    <base href="/" />

    <title>Lectorium</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: 'var(--brand)',
              'brand-to': 'var(--brand-to)',
              bg: 'var(--bg-main)',
              surface: 'var(--bg-surface)',
              sidebar: 'var(--bg-sidebar)',
              text: 'var(--text-main)',
              'text-sec': 'var(--text-sec)',
              border: 'var(--border-color)',
            },
            fontFamily: {
              gothic: ['"Pirata One"', 'cursive'],
            }
          }
        }
      }
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.50/web/pdf_viewer.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.27/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pirata+One&display=swap" rel="stylesheet">
    
    <style>
      body { 
        overscroll-behavior-y: none; 
        touch-action: pan-x pan-y; 
        background: #09090b; 
        color: #e2e8f0; 
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      #root { 
        height: 100vh; 
        height: 100dvh; 
        display: flex; 
        flex-direction: column; 
      }
      .wf-loading { visibility: hidden; }
    </style>
